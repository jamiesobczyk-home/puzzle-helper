name: Test and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Only one deploy at a time; don't cancel a deploy already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node test/run-tests.mjs

  # Publish the site by rewriting the gh-pages branch, which GitHub Pages
  # serves from. (The artifact-based deploy-pages flow needs the Pages site
  # created via API, which the workflow token isn't allowed to do.)
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git rm -r --cached . -q
          touch .nojekyll
          git add .nojekyll index.html css js README.md
          git commit -q -m "Deploy site from ${GITHUB_SHA}"
          git push --force origin gh-pages
